# ============================================================================
# Cloudflare Pages 配置 — Vibe-Trading
# 由 deploy-vt-cf.sh 自动填充 BACKEND_URL（Cloudflare Tunnel 公网地址）。
# 手动部署：wrangler pages deploy
# ============================================================================

name = "vibe-trading-dashboard"
pages_build_output_dir = "frontend/dist"
compatibility_date = "2024-09-23"

# Pages Functions 用到的环境变量（非机密，仅为隧道地址）
[vars]
# ↓↓↓ 临时模式：每次 Mac 启动 cloudflared 临时隧道会变；如需固定 URL 改用 Named Tunnel
BACKEND_URL = "https://relations-impacts-sides-dimensions.trycloudflare.com"
# 可选：astock-peg 服务的隧道地址（不填则 /peg-api 返回 503）
# BACKEND_PEG_URL = "https://REPLACE-ME-peg.cfargotunnel.com"
