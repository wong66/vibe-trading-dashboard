# 自动部署 Vibe-Trading 前端到 Cloudflare Pages
# 触发：每次 git push 到 main，或手动 workflow_dispatch
# Secrets：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID（已在仓库 Settings 配好）

name: Deploy Vibe-Trading to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: Vibe-Trading/frontend
        run: npm install

      - name: Build frontend
        working-directory: Vibe-Trading/frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: Vibe-Trading
        run: |
          npx --yes wrangler@latest pages deploy frontend/dist \
            --project-name vibe-trading-dashboard \
            --branch main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
