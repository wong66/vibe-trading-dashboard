# 自动部署 Vibe-Trading 前端到 Cloudflare Pages
# 触发：每次 git push 到 main，或手动 workflow_dispatch
# Secrets：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID（已在仓库 Settings 配好）

name: Deploy Vibe-Trading to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: Vibe-Trading/frontend
        run: npm install

      - name: Build frontend
        working-directory: Vibe-Trading/frontend
        run: npm run build
        env:
          # 不再注入 VITE_API_BASE：前端走 Pages 同源，由 functions/[[path]].js
          # 在边缘代理到 Cloudflare Tunnel（Mac 后端）。这样浏览器只发同源请求，
          # 绕开浏览器侧 CORS preflight / 扩展 / 公司网拦 cfargotunnel.com 的问题。
          #
          # 每日选股分析（dsa-web，5173）仍走独立隧道，iframe 嵌入。
          VITE_DSA_BASE: https://27ef24af-27d0-407f-a9ca-b2b8b0fd469d.cfargotunnel.com

      - name: Deploy to Cloudflare Pages
        working-directory: Vibe-Trading
        run: |
          npx --yes wrangler@latest pages deploy frontend/dist \
            --project-name vibe-trading-dashboard \
            --branch main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
