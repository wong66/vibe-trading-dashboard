# 自动部署 Vibe-Trading 前端到 Cloudflare Pages
# 触发：每次 git push 到 main，或手动 workflow_dispatch
# Secrets：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID（已在仓库 Settings 配好）

name: Deploy Vibe-Trading to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: Vibe-Trading/frontend
        run: npm install

      - name: Build frontend
        working-directory: Vibe-Trading/frontend
        run: npm run build
        env:
          # 主后端走 Cloudflare Tunnel 固定地址：浏览器【直连】隧道，由 Cloudflare
          # 公网 ingress 转发到 Mac 后端 8898。
          # （不能走 Pages Functions 边缘代理：Worker 解析 cfargotunnel.com 得到
          #   内部 ULA fd10::，会被边缘拒绝 "DNS points to local or disallowed
          #   IPv6 address"；真实浏览器走 ingress 能正常路由，故必须浏览器直连。）
          VITE_API_BASE: https://matched-recipient-navy-rational.trycloudflare.com
          # 每日选股分析（dsa-web，5173）走独立快速隧道，iframe 嵌入。
          VITE_DSA_BASE: https://announced-trusted-served-scientists.trycloudflare.com

      - name: Deploy to Cloudflare Pages
        working-directory: Vibe-Trading
        run: |
          npx --yes wrangler@latest pages deploy frontend/dist \
            --project-name vibe-trading-dashboard \
            --branch main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
