# ============================================================================
# 自动部署 Vibe-Trading 前端到 Cloudflare Pages
# 触发：每次 git push 到 main 分支
# 流程：检出代码 → 安装 Node → 构建前端 → 用 wrangler 部署到 Cloudflare Pages
# 需要的 GitHub Secrets（仓库 Settings → Secrets → Actions）：
#   CLOUDFLARE_API_TOKEN   —— Cloudflare API Token，权限模板选 "Cloudflare Pages:Edit"
#   CLOUDFLARE_ACCOUNT_ID  —— Cloudflare 账号 ID（仪表盘右侧栏）
# ============================================================================

name: Deploy Vibe-Trading to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 允许在 Actions 页面手动触发

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Vibe-Trading/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Vibe-Trading/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Vibe-Trading/frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: Vibe-Trading
        run: |
          npx --yes wrangler@latest pages deploy frontend/dist \
            --project-name vibe-trading-dashboard \
            --branch main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
