# 云端轻量版部署：独立 Pages 项目 vibe-trading-cloud（关机也能看 A股行情）
# 结构镜像已验证可用的 deploy.yml；仅改动：项目名 + 不注入隧道地址(VITE_API_BASE 留空=同源)。
# 与现有隧道版 vibe-trading-dashboard 完全独立，互不影响。

name: Deploy Vibe-Trading Cloud

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cloud-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: Vibe-Trading/frontend
        run: npm install

      - name: Build frontend (cloud mode: same-origin API)
        working-directory: Vibe-Trading/frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages (cloud project)
        working-directory: Vibe-Trading
        run: |
          npx --yes wrangler@latest pages deploy frontend/dist \
            --project-name vibe-trading-cloud \
            --branch main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
